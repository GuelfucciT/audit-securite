<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Audit Sécu">
<meta name="theme-color" content="#1a2e5a">
<title>Audit Sécurité</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--navy:#1a2e5a;--bg:#f0f2f7;--card:#fff;--muted:#666;--border:#dde3f0;--green:#1a7a3a;--orange:#d46b00;--red:#c0392b;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:#1a1a1a;min-height:100vh;padding-bottom:80px;}
.header{background:var(--navy);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.header h1{font-size:17px;font-weight:700;flex:1;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;color:var(--muted);font-size:10px;cursor:pointer;}
.nav-btn.active{color:var(--navy);}
.nav-btn svg{width:22px;height:22px;}
.screen{display:none;padding:16px;}
.screen.active{display:block;}
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.card-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:10px;}
.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;text-align:center;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-outline{background:#fff;color:var(--navy);border:2px solid var(--navy);}
.btn-danger{background:#fdecea;color:var(--red);border:2px solid var(--red);}
.btn-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-block;border-radius:10px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:#fff;}
.field textarea{min-height:70px;resize:vertical;}
.risk-bar{display:flex;gap:8px;margin-top:4px;}
.risk-btn{flex:1;padding:9px 4px;border-radius:20px;border:2px solid transparent;font-size:13px;font-weight:600;cursor:pointer;opacity:.35;transition:opacity .15s;}
.risk-btn.active{opacity:1;}
.risk-btn[data-r="faible"]{background:#d4edda;color:var(--green);border-color:var(--green);}
.risk-btn[data-r="moyen"]{background:#fde9cc;color:var(--orange);border-color:var(--orange);}
.risk-btn[data-r="eleve"]{background:#fcd9d7;color:var(--red);border-color:var(--red);}
.photo-zone{width:100%;background:#f5f6fa;border:2px dashed var(--border);border-radius:12px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:13px;overflow:hidden;position:relative;}
.photo-zone img{width:100%;height:auto;display:block;}
.photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;}
.rw{position:relative;margin-bottom:10px;border-radius:12px;height:72px;}
.del-bg{position:absolute;right:0;top:0;bottom:0;width:90px;background:var(--red);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#fff;font-size:11px;font-weight:700;border-radius:0 12px 12px 0;z-index:0;}
.del-bg svg{width:20px;height:20px;}
.ri{position:absolute;inset:0;background:var(--card);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;z-index:1;cursor:pointer;}
.ri-icon{width:42px;height:42px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ri-info{flex:1;min-width:0;}
.ri-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ri-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.sit-card{background:#f5f6fa;border-radius:12px;padding:12px;margin-bottom:10px;}
.sit-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
.sit-title{font-weight:700;font-size:14px;flex:1;}
.tbadge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600;flex-shrink:0;}
.tt{background:#e8edf7;color:var(--navy);}
.tp{background:#fdecea;color:var(--red);}
.rpill{display:inline-block;font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;}
.rf{background:#d4edda;color:var(--green);}
.rm{background:#fde9cc;color:var(--orange);}
.re{background:#fcd9d7;color:var(--red);}
.divider{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px;}
.empty{text-align:center;padding:48px 24px;color:var(--muted);}
.empty p{font-size:15px;margin-top:12px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px;width:100%;max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
.mhandle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px;}
.mtitle{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--navy);}
.mactions{display:flex;gap:10px;margin-top:16px;}
.mactions .btn{flex:1;}
.conf-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center;}
.conf-ov.open{display:flex;}
.conf-box{background:#fff;border-radius:20px;padding:28px 22px;width:88%;max-width:320px;text-align:center;}
.conf-box h3{font-size:18px;font-weight:700;margin-bottom:8px;}
.conf-box p{font-size:14px;color:var(--muted);margin-bottom:24px;}
.conf-actions{display:flex;gap:10px;}
.conf-actions .btn{flex:1;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="header">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
  <h1 id="hTitle">Audit Sécurité</h1>
</div>

<div class="screen active" id="sHome">
  <div class="divider">Rapports</div>
  <div id="rList"></div>
  <button class="btn btn-primary" id="bNew" style="margin-top:8px">+ Nouveau rapport d'audit</button>
  <div style="text-align:center;margin-top:20px;font-size:11px;color:var(--muted);">v1.0.1</div>
</div>

<div class="screen" id="sReport">
  <div class="card">
    <div class="field"><label>Secteur / Site</label><input id="fSecteur" type="text" placeholder="Ex : Secteur Sud-Est"></div>
    <div class="field"><label>Date de visite</label><input id="fDate" type="date"></div>
    <div class="field"><label>Participants</label><textarea id="fParts" placeholder="Un participant par ligne"></textarea></div>
  </div>
  <div class="divider">Situations</div>
  <div id="sList"></div>
  <button class="btn btn-outline" id="bAddSit" style="margin-bottom:10px">+ Ajouter une situation</button>
  <button class="btn btn-primary" id="bSave">Enregistrer le rapport</button>
</div>

<div class="screen" id="sPreview">
  <div style="display:flex;gap:10px;margin-bottom:12px">
    <button class="btn btn-outline" id="bBackPreview" style="flex:1">← Retour</button>
    <button class="btn btn-primary" id="bPrintPreview" style="flex:1">🖨 Imprimer / PDF</button>
  </div>
  <div id="previewContent"></div>
</div>
  <div id="vContent"></div>
  <div style="display:flex;gap:10px;margin-top:8px">
    <button class="btn btn-outline" id="bEdit" style="flex:1">Modifier</button>
    <button class="btn btn-primary" id="bPrint" style="flex:1">Export PDF</button>
  </div>
  <button class="btn btn-danger" id="bDelCur" style="margin-top:10px">Supprimer ce rapport</button>
</div>

<div class="modal-overlay" id="sitModal">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Nouvelle situation</div>
    <div class="field"><label>Type</label>
      <select id="mType">
        <option value="travail">Situation de travail</option>
        <option value="particuliere">Situation particulière</option>
      </select>
    </div>
    <div class="field"><label>Intitulé</label><input id="mTitre" type="text" placeholder="Ex : Accès à la prise d'eau"></div>
    <div class="field"><label>Photo</label>
      <div class="photo-zone" id="pZone">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span>Appuyer pour prendre une photo</span>
        <input id="pInput" type="file" accept="image/*" capture="environment">
      </div>
    </div>
    <div id="fTravail">
      <div class="field"><label>Tâche à réaliser</label><textarea id="mTache"></textarea></div>
      <div class="field"><label>Description</label><textarea id="mDesc"></textarea></div>
      <div class="field"><label>Risques</label><textarea id="mRisques"></textarea></div>
      <div class="field"><label>Fréquence</label><input id="mFreq" type="text"></div>
      <div class="field"><label>Niveau de risque</label>
        <div class="risk-bar" id="rbT">
          <button class="risk-btn" data-r="faible" type="button">Faible</button>
          <button class="risk-btn" data-r="moyen" type="button">Moyen</button>
          <button class="risk-btn" data-r="eleve" type="button">Élevé</button>
        </div>
      </div>
    </div>
    <div id="fPart" style="display:none">
      <div class="field"><label>Description</label><textarea id="mDescP"></textarea></div>
      <div class="field"><label>Conséquences</label><textarea id="mConseq"></textarea></div>
      <div class="field"><label>Niveau de risque</label>
        <div class="risk-bar" id="rbP">
          <button class="risk-btn" data-r="faible" type="button">Faible</button>
          <button class="risk-btn" data-r="moyen" type="button">Moyen</button>
          <button class="risk-btn" data-r="eleve" type="button">Élevé</button>
        </div>
      </div>
    </div>
    <div class="field"><label>Préconisations</label><textarea id="mPreco" placeholder="Une préconisation par ligne..."></textarea></div>
    <div class="mactions">
      <button class="btn btn-outline" id="bCancelSit" type="button">Annuler</button>
      <button class="btn btn-primary" id="bOkSit" type="button">Ajouter</button>
    </div>
  </div>
</div>

<div class="conf-ov" id="confOv">
  <div class="conf-box">
    <h3>Supprimer ce rapport ?</h3>
    <p>Cette action est irréversible.</p>
    <div class="conf-actions">
      <button class="btn btn-outline" id="bCancelDel" type="button">Annuler</button>
      <button class="btn btn-danger" id="bOkDel" type="button">Supprimer</button>
    </div>
  </div>
</div>

<div class="toast" id="toastEl"></div>

<div class="bottom-nav">
  <button class="nav-btn active" id="nHome" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Accueil
  </button>
  <button class="nav-btn" id="nNew" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Nouveau
  </button>
  <button class="nav-btn" id="nExport" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>PDF
  </button>
</div>

<script>
var _d=document;
var KEY='auditV4';

function persist(){
  try{localStorage.setItem(KEY,JSON.stringify(reports));}
  catch(e){
    try{
      var lite=reports.map(function(r){return Object.assign({},r,{situations:(r.situations||[]).map(function(s){return Object.assign({},s,{photo:null});})});});
      localStorage.setItem(KEY,JSON.stringify(lite));
      showToast('Photos retirées (mémoire pleine)');
    }catch(e2){showToast('Sauvegarde impossible');}
  }
}

function initData(){
  try{var s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch(e){}
  return[];
}

var reports=initData();
var viewIdx=null;
var editIdx=null;
var curSits=[];
var curPhoto=null;
var curRisk=null;
var delIdx=null;
var swipeOpen={};

var RL={faible:'Faible',moyen:'Moyen',eleve:'Élevé'};
var RC={faible:'#1a7a3a',moyen:'#d46b00',eleve:'#c0392b'};
var RB={faible:'#d4edda',moyen:'#fde9cc',eleve:'#fcd9d7'};

function show(n){
  ['Home','Report','View','Preview'].forEach(function(x){_d.getElementById('s'+x).classList.remove('active');});
  ['nHome','nNew','nExport'].forEach(function(x){_d.getElementById(x).classList.remove('active');});
  _d.getElementById('s'+n).classList.add('active');
  var titles={Home:'Audit Sécurité',Report:editIdx!==null?'Modifier':'Nouveau rapport',View:(reports[viewIdx]&&reports[viewIdx].secteur)||'Rapport',Preview:'Aperçu PDF'};
  _d.getElementById('hTitle').textContent=titles[n]||'Audit Sécurité';
  if(n==='Home'){_d.getElementById('nHome').classList.add('active');renderList();}
  if(n==='Report')_d.getElementById('nNew').classList.add('active');
  if(n==='View')_d.getElementById('nHome').classList.add('active');
}

function renderList(){
  var el=_d.getElementById('rList');
  if(!reports.length){
    el.innerHTML='<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>Aucun rapport.<br>Créez votre premier audit.</p></div>';
    return;
  }
  var html='';
  for(var i=0;i<reports.length;i++){
    var r=reports[i];
    html+='<div class="rw" id="rw'+i+'"><div class="del-bg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>Supprimer</div><div class="ri" id="ri'+i+'"><div class="ri-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div><div class="ri-info"><div class="ri-name">'+(r.secteur||'Sans titre')+'</div><div class="ri-meta">'+(r.date||'—')+' · '+((r.situations&&r.situations.length)||0)+' situation(s)</div></div><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div></div>';
  }
  el.innerHTML=html;
  for(var j=0;j<reports.length;j++){attachSwipe(j);}
}

function attachSwipe(i){
  var el=_d.getElementById('ri'+i);
  if(!el)return;
  var x0,y0,dx=0,moved=false,dirH=false;
  swipeOpen[i]=swipeOpen[i]||false;
  el.addEventListener('touchstart',function(e){
    Object.keys(swipeOpen).forEach(function(k){if(+k!==i&&swipeOpen[k])closeSwipe(+k);});
    x0=e.touches[0].clientX;y0=e.touches[0].clientY;
    dx=0;moved=false;dirH=false;el.style.transition='none';
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    var ddx=e.touches[0].clientX-x0,ddy=e.touches[0].clientY-y0;
    if(!moved){if(Math.abs(ddx)<5&&Math.abs(ddy)<5)return;moved=true;dirH=Math.abs(ddx)>Math.abs(ddy);}
    if(!dirH)return;
    e.preventDefault();
    dx=Math.max(-90,Math.min(0,ddx));
    el.style.transform='translateX('+dx+'px)';
  },{passive:false});
  el.addEventListener('touchend',function(){
    el.style.transition='transform .22s ease';
    if(dx<-44){el.style.transform='translateX(-90px)';swipeOpen[i]=true;}
    else{el.style.transform='translateX(0)';swipeOpen[i]=false;}
    dx=0;
  },{passive:true});
  el.addEventListener('click',function(e){
    if(swipeOpen[i]){e.stopPropagation();closeSwipe(i);askDel(i);}
    else if(!moved||Math.abs(dx)<5){openReport(i);}
  });
}

function closeSwipe(i){
  var el=_d.getElementById('ri'+i);
  if(el){el.style.transition='transform .22s ease';el.style.transform='translateX(0)';}
  swipeOpen[i]=false;
}

function startNew(){
  editIdx=null;curSits=[];
  _d.getElementById('fSecteur').value='';
  _d.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  _d.getElementById('fParts').value='';
  renderSits();show('Report');
}

function openReport(idx){
  viewIdx=idx;
  var r=reports[idx];
  var pts=(r.participants||'').split('\n').filter(Boolean).map(function(p){return '<li>'+p+'</li>';}).join('');
  var h='<div class="card"><div class="card-title">'+(r.secteur||'—')+'</div><div style="color:var(--muted);font-size:14px;margin-bottom:8px">📅 '+(r.date||'—')+'</div>'+(pts?'<b style="font-size:13px">Participants</b><ul style="padding-left:18px;font-size:14px;margin-top:4px">'+pts+'</ul>':'')+'</div>';
  (r.situations||[]).forEach(function(s){
    var isP=s.type==='particuliere';
    var rp=s.risk?'<span class="rpill r'+s.risk[0]+'">'+RL[s.risk]+'</span>':'';
    var ps=(s.preconisations||'').split('\n').filter(Boolean).map(function(p){return '<li>'+p+'</li>';}).join('');
    h+='<div class="card"><div class="card-title">'+(isP?'⚠️ Particulière':'🔧 Travail')+' : '+(s.titre||'')+'</div>'+(s.photo?'<img src="'+s.photo+'" style="width:100%;border-radius:10px;margin-bottom:10px">':'')+rp+(!isP&&s.tache?'<div style="margin-top:8px"><b>Tâche :</b> '+s.tache+'</div>':'')+(s.description?'<div style="margin-top:6px"><b>'+(isP?'Description':'Situation')+' :</b> '+s.description+'</div>':'')+(!isP&&s.risques?'<div style="margin-top:6px"><b>Risques :</b> '+s.risques+'</div>':'')+(!isP&&s.frequence?'<div style="margin-top:6px"><b>Fréquence :</b> '+s.frequence+'</div>':'')+(isP&&s.consequences?'<div style="margin-top:6px"><b>Conséquences :</b> '+s.consequences+'</div>':'')+(ps?'<div style="margin-top:8px"><b>Préconisations :</b><ul style="padding-left:18px;margin-top:4px">'+ps+'</ul></div>':'')+'</div>';
  });
  _d.getElementById('vContent').innerHTML=h;
  show('View');
}

function startEdit(){
  var r=reports[viewIdx];
  editIdx=viewIdx;
  _d.getElementById('fSecteur').value=r.secteur||'';
  _d.getElementById('fDate').value=r.date||'';
  _d.getElementById('fParts').value=r.participants||'';
  curSits=JSON.parse(JSON.stringify(r.situations||[]));
  renderSits();show('Report');
}

function doSave(){
  var r={
    secteur:_d.getElementById('fSecteur').value.trim()||'Sans titre',
    date:_d.getElementById('fDate').value,
    participants:_d.getElementById('fParts').value,
    situations:JSON.parse(JSON.stringify(curSits)),
    savedAt:Date.now()
  };
  var idx;
  if(editIdx!==null){reports[editIdx]=r;idx=editIdx;}
  else{reports.unshift(r);idx=0;}
  editIdx=null;
  persist();
  showToast('Rapport enregistré ✓');
  viewIdx=idx;
  openReport(idx);
}

function askDel(idx){delIdx=idx;_d.getElementById('confOv').classList.add('open');}

function renderSits(){
  var el=_d.getElementById('sList');
  if(!curSits.length){el.innerHTML='';return;}
  var h='';
  for(var i=0;i<curSits.length;i++){
    var s=curSits[i];
    h+='<div class="sit-card"><div class="sit-head"><div class="sit-title">'+(s.titre||'Sans titre')+'</div><span class="tbadge '+(s.type==='particuliere'?'tp':'tt')+'">'+(s.type==='particuliere'?'Particulière':'Travail')+'</span></div>'+(s.risk?'<span class="rpill r'+s.risk[0]+'">'+RL[s.risk]+'</span>':'')+'<div style="margin-top:8px"><button class="btn btn-danger btn-sm" data-i="'+i+'" type="button">Supprimer</button></div></div>';
  }
  el.innerHTML=h;
  el.querySelectorAll('[data-i]').forEach(function(b){
    b.addEventListener('click',function(){curSits.splice(+b.dataset.i,1);renderSits();});
  });
}

function openSitModal(){
  curPhoto=null;curRisk=null;
  ['mTitre','mTache','mDesc','mRisques','mFreq','mDescP','mConseq','mPreco'].forEach(function(id){_d.getElementById(id).value='';});
  _d.getElementById('mType').value='travail';
  resetPhotoZone();
  _d.querySelectorAll('.risk-btn').forEach(function(b){b.classList.remove('active');});
  toggleSitType();
  _d.getElementById('sitModal').classList.add('open');
}

function resetPhotoZone(){
  var z=_d.getElementById('pZone');
  z.innerHTML='<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Appuyer pour prendre une photo</span><input id="pInput" type="file" accept="image/*" capture="environment">';
  _d.getElementById('pInput').addEventListener('change',handlePhoto);
}

function toggleSitType(){
  var t=_d.getElementById('mType').value;
  _d.getElementById('fTravail').style.display=t==='travail'?'':'none';
  _d.getElementById('fPart').style.display=t==='particuliere'?'':'none';
}

function doAddSit(){
  var type=_d.getElementById('mType').value;
  var s={type:type,titre:_d.getElementById('mTitre').value,photo:curPhoto,preconisations:_d.getElementById('mPreco').value,risk:curRisk};
  if(type==='travail'){s.tache=_d.getElementById('mTache').value;s.description=_d.getElementById('mDesc').value;s.risques=_d.getElementById('mRisques').value;s.frequence=_d.getElementById('mFreq').value;}
  else{s.description=_d.getElementById('mDescP').value;s.consequences=_d.getElementById('mConseq').value;}
  curSits.push(s);renderSits();
  _d.getElementById('sitModal').classList.remove('open');
  showToast('Situation ajoutée ✓');
}

function handlePhoto(e){
  var file=e.target.files[0];if(!file)return;
  var img=new Image(),url=URL.createObjectURL(file);
  img.onload=function(){
    var MAX=1000,Q=0.65,w=img.width,h=img.height;
    if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
    var c=_d.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    curPhoto=c.toDataURL('image/jpeg',Q);
    URL.revokeObjectURL(url);
    var z=_d.getElementById('pZone');
    z.innerHTML='<img src="'+curPhoto+'"><input id="pInput" type="file" accept="image/*" capture="environment">';
    _d.getElementById('pInput').addEventListener('change',handlePhoto);
  };
  img.src=url;
}

function setupRiskBar(barId){
  _d.getElementById(barId).querySelectorAll('.risk-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      _d.getElementById(barId).querySelectorAll('.risk-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');curRisk=btn.dataset.r;
    });
  });
}

function doPrint(){
  if(viewIdx===null){showToast("Ouvrez un rapport d'abord");return;}
  var r=reports[viewIdx];
  var pts=(r.participants||'').split('\n').filter(Boolean).map(function(p){return '<li>'+p+'</li>';}).join('');
  var sp='';
  (r.situations||[]).forEach(function(s){
    var isP=s.type==='particuliere';
    var ps=(s.preconisations||'').split('\n').filter(Boolean).map(function(p){return '<li>'+p+'</li>';}).join('');
    var rh=s.risk?'<span style="display:inline-block;padding:3px 14px;border-radius:20px;font-size:14px;font-weight:700;background:'+RB[s.risk]+';color:'+RC[s.risk]+';margin-bottom:10px">'+RL[s.risk]+'</span>':'';
    var bh=isP?
      (s.description?'<p><b>Description :</b> '+s.description+'</p>':'')+(s.consequences?'<p><b>Conséquences :</b> '+s.consequences+'</p>':''):
      (s.tache?'<p><b>Tâche :</b> '+s.tache+'</p>':'')+(s.description?'<p><b>Situation :</b> '+s.description+'</p>':'')+(s.risques?'<p><b>Risques :</b> '+s.risques+'</p>':'')+(s.frequence?'<p><b>Fréquence :</b> '+s.frequence+'</p>':'');
    sp+='<div class="sp"><div class="ss"></div><div class="sl">'+(s.photo?'<img src="'+s.photo+'">':'<div style="flex:1"></div>')+'</div><div class="srw"><div class="sr"><h2>'+(isP?'Situation particulière':'Situation de travail')+' : '+(s.titre||'')+'</h2>'+rh+bh+(ps?'<p><b>Préconisations :</b></p><ul>'+ps+'</ul>':'')+'</div><div class="sf"></div></div></div>';
  });

  var css='*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;}'
    +'.tb{position:fixed;top:0;left:0;right:0;background:#1a2e5a;color:#fff;display:flex;align-items:center;gap:10px;padding:10px 16px;z-index:100;}'
    +'.tb button{padding:7px 16px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;}'
    +'.btn-bk{background:rgba(255,255,255,.2);color:#fff;}'
    +'.btn-sh{background:#2e8b2e;color:#fff;}'
    +'.btn-pr{background:#fff;color:#1a2e5a;}'
    +'.tb-title{flex:1;font-size:15px;font-weight:700;}'
    +'.wrap{margin-top:52px;}'
    +'@media print{.tb{display:none!important;}.wrap{margin-top:0;}@page{size:A4 landscape;margin:0;}}'
    +'.cv{width:297mm;min-height:210mm;display:flex;page-break-after:always;}'
    +'.csb{width:14px;background:#1a2e5a;flex-shrink:0;}'
    +'.cb{flex:1;display:flex;flex-direction:column;}'
    +'.cm{flex:1;display:flex;align-items:center;padding:40px;}'
    +'.ct{padding-left:28px;border-left:8px solid #1a2e5a;}'
    +'.ct h1{font-size:52px;font-weight:700;line-height:1.2;}'
    +'.cd{font-size:22px;font-weight:700;margin-top:16px;color:#1a2e5a;}'
    +'.cpa{margin-top:20px;border-top:1px solid #dde;padding-top:14px;}'
    +'.cpa b{font-size:18px;font-weight:700;display:block;margin-bottom:8px;color:#1a2e5a;}'
    +'.cpa ul{padding-left:22px;}.cpa li{font-size:17px;padding:3px 0;}'
    +'.cfb{height:38px;background:#1a2e5a;}'
    +'.sp{width:297mm;height:210mm;display:flex;page-break-after:always;overflow:hidden;}'
    +'.ss{width:14px;background:#1a2e5a;flex-shrink:0;}'
    +'.sl{width:44%;flex-shrink:0;background:#f0f0f0;display:flex;align-items:center;justify-content:center;}'
    +'.sl img{width:100%;height:calc(210mm - 38px);object-fit:contain;object-position:center;display:block;}'
    +'.srw{flex:1;display:flex;flex-direction:column;}'
    +'.sr{flex:1;padding:20px 24px 12px;overflow:hidden;}'
    +'.sr h2{font-size:26px;font-weight:700;border-bottom:2px solid #1a2e5a;padding-bottom:8px;margin-bottom:12px;line-height:1.3;}'
    +'.sr p{margin-bottom:8px;font-size:18px;line-height:1.6;}'
    +'.sr ul{padding-left:20px;margin-top:4px;}.sr li{font-size:17px;padding:3px 0;line-height:1.5;}'
    +'.sf{height:38px;background:#1a2e5a;flex-shrink:0;}';

  var titre=r.secteur||'—';
  var dateR=r.date||'—';
  var ptsHtml=pts?'<div class="cpa"><b>Participants à la visite :</b><ul>'+pts+'</ul></div>':'';

  // Construire le HTML sans aucun tag script problématique
  var parts=[
    '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">',
    '<meta name="viewport" content="width=device-width,initial-scale=1">',
    '<title>Audit — '+titre+'</title>',
    '<style>'+css+'</style></head><body>',
    '<div class="tb">',
    '<button class="btn-bk" id="bb">← Retour</button>',
    '<span class="tb-title">'+titre+'</span>',
    '<button class="btn-sh" id="bs">⬆ Partager</button>',
    '<button class="btn-pr" id="bp">🖨 PDF</button>',
    '</div>',
    '<div class="wrap">',
    '<div class="cv"><div class="csb"></div><div class="cb"><div class="cm"><div class="ct">',
    '<h1>Audit sécurité :<br>'+titre+'</h1>',
    '<div class="cd">'+dateR+'</div>',
    ptsHtml,
    '</div></div><div class="cfb"></div></div></div>',
    sp,
    '</div></body></html>'
  ];

  var w=window.open('','_blank');
  w.document.write(parts.join(''));
  w.document.close();
  w.onload=function(){
    w.document.getElementById('bb').onclick=function(){w.close();};
    w.document.getElementById('bp').onclick=function(){w.print();};
    w.document.getElementById('bs').onclick=function(){
      if(w.navigator.share){
        w.navigator.share({title:'Audit — '+titre,text:'Rapport audit sécurité'}).catch(function(){});
      } else {
        w.alert('Utilisez le bouton Partager de votre navigateur');
      }
    };
  };
}

function showToast(msg){
  var t=_d.getElementById('toastEl');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

_d.getElementById('pInput').addEventListener('change',handlePhoto);
_d.getElementById('bCancelDel').addEventListener('click',function(){
  if(delIdx!==null)closeSwipe(delIdx);
  delIdx=null;
  _d.getElementById('confOv').classList.remove('open');
});
_d.getElementById('bOkDel').addEventListener('click',function(){
  if(delIdx===null)return;
  reports.splice(delIdx,1);persist();delIdx=null;
  _d.getElementById('confOv').classList.remove('open');
  showToast('Rapport supprimé');
  viewIdx=null;show('Home');
});
setupRiskBar('rbT');
setupRiskBar('rbP');
renderList();
</script>
